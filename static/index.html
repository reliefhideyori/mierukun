<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZONIST</title>
  <style>
    :root {
      --bg:       #060a18;
      --surface:  rgba(255,255,255,.035);
      --surface2: rgba(255,255,255,.065);
      --border:   rgba(255,255,255,.07);
      --border-hi: rgba(255,255,255,.14);
      --accent:   #7c6bff;
      --red:      #ef4444;
      --text:     #e4ecff;
      --muted:    #4e5e7a;
      --sub:      #7e8fa8;
      --radius:   16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 90% 50% at 50% -5%, rgba(100,80,255,.18) 0%, transparent 65%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 clamp(16px, 2.5vw, 40px) 56px;
    }

    /* ── ヘッダー ── */
    header {
      width: 100%;
      padding: 28px 0 0;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    h1 {
      font-size: 1.55rem; font-weight: 900; letter-spacing: -.03em;
      background: linear-gradient(135deg, #fff 30%, rgba(180,170,255,.7) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    /* ── ユーザーメニュー ── */
    .user-menu {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.06); border: 1px solid var(--border-hi);
      border-radius: 100px; padding: 4px 12px 4px 6px; cursor: pointer;
      transition: background .15s;
    }
    .user-menu:hover { background: rgba(255,255,255,.1); }
    .user-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      object-fit: cover; background: var(--accent);
      flex-shrink: 0;
    }
    .user-name { font-size: .72rem; font-weight: 600; color: var(--text); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-badge {
      font-size: .65rem; font-weight: 700; padding: 2px 8px;
      border-radius: 100px; background: rgba(124,107,255,.18);
      color: #b0a4ff; border: 1px solid rgba(124,107,255,.3);
    }
    .session-badge.warn { background: rgba(255,144,64,.18); color: #ffc080; border-color: rgba(255,144,64,.3); }
    .user-dropdown {
      position: relative;
    }
    .user-dropdown-menu {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: #0e1525; border: 1px solid var(--border-hi);
      border-radius: 12px; padding: 6px; min-width: 160px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4); z-index: 100;
      display: none;
    }
    .user-dropdown-menu.open { display: block; }
    .user-dropdown-item {
      display: block; width: 100%; text-align: left;
      padding: 8px 12px; border: none; background: none;
      color: var(--sub); font-size: .78rem; border-radius: 7px;
      cursor: pointer; transition: background .12s, color .12s;
      text-decoration: none;
    }
    .user-dropdown-item:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .user-dropdown-item.danger:hover { background: rgba(239,68,68,.15); color: #fca5a5; }

    /* ── アップグレードモーダル ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.65); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .modal-box {
      background: #0e1525; border: 1px solid var(--border-hi);
      border-radius: 22px; padding: 40px 36px 32px;
      max-width: 420px; width: 100%; text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }
    .modal-icon { font-size: 2.4rem; margin-bottom: 14px; }
    .modal-title { font-size: 1.2rem; font-weight: 800; color: var(--text); margin-bottom: 10px; }
    .modal-body  { font-size: .88rem; color: var(--sub); line-height: 1.65; margin-bottom: 28px; }
    .modal-body strong { color: var(--text); }
    .btn-upgrade {
      display: block; width: 100%;
      background: linear-gradient(135deg, #6c5fff, #9b5de5);
      color: #fff; border: none; border-radius: 100px;
      padding: 14px 24px; font-size: 1rem; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 20px rgba(108,95,255,.4);
      transition: transform .15s, box-shadow .15s; margin-bottom: 10px;
    }
    .btn-upgrade:hover { transform: scale(1.03); box-shadow: 0 6px 28px rgba(108,95,255,.55); }
    .btn-dismiss {
      display: block; width: 100%;
      background: rgba(255,255,255,.07); color: var(--sub);
      border: none; border-radius: 100px; padding: 11px 24px;
      font-size: .85rem; cursor: pointer; transition: background .15s;
    }
    .btn-dismiss:hover { background: rgba(255,255,255,.12); color: var(--text); }
    /* アップグレード成功バナー */
    .upgrade-banner {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, rgba(52,211,153,.15), rgba(52,211,153,.1));
      border: 1px solid rgba(52,211,153,.3); border-radius: 100px;
      padding: 10px 22px; color: #6ee7b7; font-size: .85rem; font-weight: 700;
      z-index: 300; box-shadow: 0 4px 20px rgba(0,0,0,.3);
      animation: slideDown .4s ease-out;
    }
    @keyframes slideDown { from { opacity:0; transform: translateX(-50%) translateY(-16px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    .badge { font-size: .88rem; padding: 5px 14px; border-radius: 100px; font-weight: 600; letter-spacing: .03em; }
    .badge-gray   { background: rgba(255,255,255,.07); color: var(--sub); }
    .badge-green  { background: rgba(52,211,153,.12); color: #6ee7b7; border: 1px solid rgba(52,211,153,.2); }
    .badge-red    { background: rgba(239,68,68,.12);  color: #fca5a5; border: 1px solid rgba(239,68,68,.2); }
    .badge-yellow { background: rgba(245,158,11,.12); color: #fde68a; border: 1px solid rgba(245,158,11,.2); }

    .proc-badge {
      font-size: .88rem; padding: 5px 14px; border-radius: 100px; font-weight: 600;
      background: rgba(245,158,11,.12); color: #fde68a;
      border: 1px solid rgba(245,158,11,.22);
      animation: procpulse 1.8s ease-in-out infinite;
    }
    @keyframes procpulse { 0%,100%{opacity:.65} 50%{opacity:1} }

    /* ── メインホワイトボードカード ── */
    .mindmap-main-card {
      width: 100%;
      margin: 22px 0 0;
      background: rgba(255,255,255,.025);
      border: 1px solid var(--border);
      border-radius: 22px;
      position: relative;
      min-height: 340px;
      backdrop-filter: blur(20px);
    }
    .mindmap-main-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px 10px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .mindmap-main-label {
      font-size: .65rem; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: .13em;
    }
    #status-text { font-size: .74rem; color: var(--sub); text-align: right; }
    #status-text.err { color: #fca5a5; }

    #mindmap-main-inner {
      padding: 12px 12px 74px;
      min-height: 270px;
    }
    #mindmap-main-inner .empty-hint { padding: 80px 0; text-align: center; }

    /* ── ホワイトボード: 2カラム（全セクション同サイズ） ── */
    .whiteboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: minmax(160px, auto);
      gap: 10px;
      width: 100%;
    }

    .wb-section {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: border-color .2s;
    }
    .wb-section:hover { border-color: var(--border-hi); }
    .wb-section-header {
      padding: 13px 16px 11px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .wb-section-title {
      font-size: .95rem; font-weight: 800;
      letter-spacing: .04em;
    }
    .wb-count {
      font-size: .65rem;
      padding: 1px 7px; border-radius: 100px;
      background: rgba(255,255,255,.08);
      color: var(--sub);
    }
    .wb-section-body {
      padding: 8px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
      align-content: start;
      flex: 1; overflow-y: auto;
      transition: background .15s;
    }
    /* グループ・追加フォームは2列全幅 */
    .wb-section-body .wb-group,
    .wb-section-body .wb-add-form,
    .wb-section-body .wb-empty { grid-column: 1 / -1; }
    .wb-section-body.drag-over-section {
      background: rgba(124,107,255,.08);
      outline: 2px dashed rgba(124,107,255,.35);
      outline-offset: -3px;
      border-radius: 8px;
    }

    /* ── カード ── */
    .wb-card {
      background: rgba(255,255,255,.045);
      border-radius: 9px;
      padding: 9px 11px;
      border-left: 2.5px solid;
      position: relative;
      cursor: grab;
      transition: background .15s, transform .15s, box-shadow .15s;
      user-select: none;
    }
    .wb-card:hover {
      background: rgba(255,255,255,.075);
      transform: translateX(2px);
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
    }
    .wb-card:active { cursor: grabbing; }
    .wb-card.editing { cursor: default; user-select: auto; transform: none; }
    .wb-card.dragging { opacity: 0.3; cursor: grabbing; transform: scale(.97); }
    .wb-card.drag-over {
      outline: 2px dashed var(--accent);
      background: rgba(124,107,255,.1);
      transform: none;
    }
    .wb-card-title {
      font-size: .82rem; font-weight: 600; line-height: 1.35;
      color: var(--text);      /* 白系固定 – カテゴリ色より格段に読みやすい */
      margin-bottom: 3px;
      padding-right: 22px;
    }
    .wb-card-body { font-size: .73rem; color: var(--sub); line-height: 1.45; }
    .wb-card-delete {
      position: absolute; top: 6px; right: 6px;
      width: 17px; height: 17px; border-radius: 50%;
      border: none; background: rgba(255,255,255,.08); color: var(--sub);
      font-size: .6rem; cursor: pointer; opacity: 0;
      transition: opacity .15s, background .15s;
      display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .wb-card:hover .wb-card-delete { opacity: 1; }
    .wb-card-delete:hover { background: rgba(239,68,68,.7); color: #fff; }

    /* ── グループ（明確な枠 + 色付きヘッダーバー） ── */
    .wb-group {
      border-radius: 10px;
      overflow: hidden;
      border: 1.5px solid;
    }
    .wb-group-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 8px 5px 11px;
    }
    .wb-group-label {
      font-size: .62rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .09em;
    }
    .wb-group-label {
      cursor: text;
      border-radius: 3px;
      padding: 1px 3px;
      transition: background .12s;
    }
    .wb-group-label:hover { background: rgba(255,255,255,.1); }
    /* グループ名インライン入力 */
    .wb-group-name-input {
      background: transparent;
      border: none;
      border-bottom: 1.5px solid currentColor;
      color: inherit;
      font: inherit;
      outline: none;
      width: 110px;
      max-width: 160px;
      padding: 0 2px 1px;
    }
    .wb-group-ungroup {
      font-size: .6rem; color: rgba(255,255,255,.45);
      background: rgba(255,255,255,.1); border: none; border-radius: 4px;
      padding: 2px 8px; cursor: pointer;
      opacity: 0; transition: opacity .15s, background .15s;
    }
    .wb-group:hover .wb-group-ungroup { opacity: 1; }
    .wb-group-ungroup:hover { background: rgba(255,255,255,.2); color: var(--text); }
    .wb-group-cards { padding: 6px; display: flex; flex-direction: column; gap: 5px; }
    /* グループ内のカードは左端インデント感を減らす */
    .wb-group .wb-card { border-left-width: 2px; border-radius: 7px; }

    .wb-empty { font-size: .72rem; color: var(--muted); padding: 10px 4px; text-align: center; opacity: .5; }

    /* ── インライン編集 ── */
    .wb-edit-title {
      display: block; width: 100%;
      background: rgba(255,255,255,.08);
      border: 1.5px solid var(--accent);
      border-radius: 5px; color: var(--text);
      font-size: .82rem; font-weight: 600; font-family: inherit;
      padding: 4px 7px; outline: none; margin-bottom: 5px;
    }
    .wb-edit-body {
      display: block; width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border-hi);
      border-radius: 5px; color: var(--sub);
      font-size: .73rem; font-family: inherit;
      padding: 4px 7px; resize: vertical; outline: none; min-height: 38px;
    }
    .wb-edit-hint {
      font-size: .6rem; color: var(--muted); margin-top: 4px; text-align: right;
    }

    /* ── 手動カード追加ボタン＆フォーム ── */
    .wb-add-btn {
      background: none; border: none; cursor: pointer;
      color: var(--sub); font-size: 1.35rem; line-height: 1; font-weight: 300;
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: background .15s, color .15s; flex-shrink: 0; padding: 0;
    }
    .wb-add-btn:hover { background: rgba(255,255,255,.12); color: var(--text); }
    .wb-add-form {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border-hi);
      border-radius: 9px;
      padding: 10px 11px 9px;
      display: flex; flex-direction: column; gap: 6px;
      margin-bottom: 4px;
    }
    .wb-add-title {
      background: rgba(255,255,255,.07);
      border: 1.5px solid var(--border-hi);
      border-radius: 5px; color: var(--text);
      font-size: .82rem; font-weight: 600; font-family: inherit;
      padding: 5px 8px; outline: none; width: 100%;
    }
    .wb-add-title:focus { border-color: var(--accent); }
    .wb-add-body {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 5px; color: var(--sub);
      font-size: .73rem; font-family: inherit;
      padding: 5px 8px; resize: vertical; outline: none; width: 100%; min-height: 38px;
    }
    .wb-add-body:focus { border-color: var(--border-hi); }
    .wb-add-actions { display: flex; gap: 7px; justify-content: flex-end; margin-top: 2px; }
    .wb-add-submit {
      font-size: .7rem; font-weight: 700; padding: 4px 14px;
      border: none; border-radius: 6px; cursor: pointer;
      background: var(--accent); color: #fff; transition: opacity .15s;
    }
    .wb-add-submit:hover { opacity: .85; }
    .wb-add-cancel {
      font-size: .7rem; padding: 4px 10px;
      border: none; border-radius: 6px; cursor: pointer;
      background: rgba(255,255,255,.07); color: var(--sub); transition: background .15s;
    }
    .wb-add-cancel:hover { background: rgba(255,255,255,.13); color: var(--text); }

    /* ── アップグレードボタン（ヘッダー内） ── */
    #upgrade-quick-btn {
      display: flex; align-items: center; gap: 5px;
      background: linear-gradient(135deg, rgba(108,95,255,.22), rgba(155,93,229,.22));
      border: 1px solid rgba(124,107,255,.4);
      border-radius: 100px; padding: 6px 14px 6px 11px;
      cursor: pointer;
      color: #c4baff; font-size: .75rem; font-weight: 700;
      transition: background .15s, transform .15s;
      white-space: nowrap; flex-shrink: 0;
    }
    #upgrade-quick-btn:hover {
      background: linear-gradient(135deg, rgba(108,95,255,.38), rgba(155,93,229,.38));
      transform: scale(1.04);
    }

    /* ── カード: 強調表示（タップでタイトル黄色） ── */
    .wb-card.starred {
      background: rgba(251,191,36,.06);
    }
    .wb-card.starred .wb-card-title { color: #fde68a !important; }
    .wb-card-title { padding-right: 22px; }

    /* ── カードのテキスト選択を無効化（長押しグルーピングのため） ── */
    .wb-card { user-select: none; -webkit-user-select: none; }
    .wb-group-label, .wb-group-name-input { user-select: text; -webkit-user-select: text; }

    /* ── 選択モード（モバイル長押しグルーピング） ── */
    .wb-card.selectable { cursor: pointer; }
    .wb-card.selected {
      outline: 2px solid var(--accent);
      background: rgba(124,107,255,.12);
      transform: none;
    }
    #select-group-bar {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      display: none; align-items: center; gap: 10px;
      background: #0e1525; border: 1px solid rgba(124,107,255,.5);
      border-radius: 100px; padding: 8px 20px 8px 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5); z-index: 50;
      animation: slideUp .25s ease-out;
    }
    #select-group-bar.show { display: flex; }
    @keyframes slideUp { from { opacity:0; transform: translateX(-50%) translateY(12px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    #select-group-bar span { font-size: .8rem; color: var(--sub); }
    #btn-do-group {
      background: var(--accent); color: #fff; border: none;
      border-radius: 100px; padding: 6px 16px; font-size: .8rem; font-weight: 700; cursor: pointer;
    }
    #btn-cancel-select {
      background: rgba(255,255,255,.07); color: var(--sub); border: none;
      border-radius: 100px; padding: 6px 12px; font-size: .8rem; cursor: pointer;
    }

    /* ── 録音オーバーレイ（右下） ── */
    .rec-mini-overlay {
      position: absolute; bottom: 16px; right: 16px;
      display: flex; align-items: center; gap: 10px;
      background: rgba(6,10,24,.85);
      border: 1px solid var(--border-hi); border-radius: 100px;
      padding: 6px 16px 6px 12px; backdrop-filter: blur(20px); z-index: 10;
    }
    #timer {
      font-size: .95rem; font-weight: 700; font-variant-numeric: tabular-nums;
      color: var(--sub); min-width: 42px; text-align: right;
    }
    #timer.rec { color: #fca5a5; }
    #rec-btn {
      width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #6c5fff, #9b5de5);
      color: #fff; box-shadow: 0 4px 20px rgba(108,95,255,.45);
      transition: transform .15s, box-shadow .15s; flex-shrink: 0;
    }
    #rec-btn:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(108,95,255,.6); }
    #rec-btn:active { transform: scale(.94); }
    #rec-btn.rec {
      background: linear-gradient(135deg, #ef4444, #f97316);
      box-shadow: 0 4px 20px rgba(239,68,68,.5);
      animation: pulse 1.3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 4px 20px rgba(239,68,68,.5); }
      50%      { box-shadow: 0 4px 32px rgba(239,68,68,.75), 0 0 0 9px rgba(239,68,68,.1); }
    }

    /* ── コンテンツ / ログ ── */
    .content-area { width: 100%; margin: 16px 0 0; }
    .main-panel {
      background: rgba(255,255,255,.025);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
    }
    .log-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px 11px; border-bottom: 1px solid var(--border);
    }
    .log-title { font-size: .65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; }
    .log-header-right { display: flex; gap: 10px; align-items: center; }
    .log-count { font-size: .7rem; color: var(--sub); }
    .btn-text {
      background: none; border: none; color: var(--sub); font-size: .75rem;
      cursor: pointer; padding: 3px 8px; border-radius: 6px; transition: background .15s, color .15s;
    }
    .btn-text:hover { background: rgba(255,255,255,.07); color: var(--text); }
    .log-body { max-height: 420px; overflow-y: auto; }
    .log-entry { padding: 12px 18px; border-bottom: 1px solid var(--border); }
    .log-entry:last-child { border-bottom: none; }
    .log-entry.hi { background: rgba(124,107,255,.05); }
    .log-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 5px; }
    .log-time { font-size: .7rem; font-family: monospace; color: var(--muted); }
    .log-sz   { font-size: .66rem; color: var(--muted); background: rgba(255,255,255,.06); padding: 1px 7px; border-radius: 100px; }
    .log-txt  { font-size: .87rem; line-height: 1.65; word-break: break-word; white-space: pre-wrap; color: var(--text); }
    .log-txt.err { color: #fca5a5; }
    .log-placeholder { padding: 36px 18px; text-align: center; color: var(--muted); font-size: .85rem; }
    .empty-hint { color: var(--muted); font-size: .87rem; text-align: center; padding: 44px 0; }

    /* ── スクロールバー ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

    /* ── アンドゥトースト ── */
    #undo-toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1a2036; border: 1px solid var(--border-hi);
      border-radius: 100px; padding: 10px 10px 10px 18px;
      align-items: center; gap: 10px; display: none;
      font-size: .82rem; color: var(--sub); z-index: 50;
      box-shadow: 0 8px 24px rgba(0,0,0,.4); white-space: nowrap;
    }
    #undo-toast.show { display: flex; animation: toastUp .22s ease-out; }
    #undo-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 100px; padding: 5px 14px;
      font-size: .78rem; font-weight: 700; cursor: pointer;
    }
    #undo-btn:hover { background: #9b8fff; }
    @keyframes toastUp {
      from { opacity:0; transform: translateX(-50%) translateY(8px); }
      to   { opacity:1; transform: translateX(-50%) translateY(0); }
    }

    /* ── エクスポートボタン ── */
    .mindmap-header-right { display: flex; align-items: center; gap: 10px; }
    #btn-export {
      background: rgba(124,107,255,.13); border: 1px solid rgba(124,107,255,.3);
      color: #b0a4ff;
      font-size: .68rem; cursor: pointer; padding: 3px 10px;
      border-radius: 100px; transition: background .15s, color .15s, border-color .15s;
      white-space: nowrap;
    }
    #btn-export:not(:disabled):hover {
      background: rgba(124,107,255,.24); border-color: rgba(124,107,255,.5);
      color: #c8bfff;
    }
    #btn-export:disabled {
      background: none; border-color: var(--border); color: var(--muted);
      opacity: .28; cursor: default;
    }

    /* ── マイク選択 ── */
    .mic-select-wrap { position: relative; display: flex; }
    .mic-btn {
      width: 28px; height: 28px; border-radius: 50%; border: 1px solid transparent;
      cursor: pointer; background: rgba(255,255,255,.07); color: var(--sub);
      font-size: .82rem; display: flex; align-items: center; justify-content: center;
      transition: background .15s; flex-shrink: 0;
    }
    .mic-btn:hover { background: rgba(255,255,255,.13); color: var(--text); }
    .mic-btn.has-selection { border-color: rgba(124,107,255,.4); color: var(--accent); }
    .mic-dropdown {
      position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%);
      background: #0e1525; border: 1px solid var(--border-hi);
      border-radius: 12px; padding: 6px; min-width: 230px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5); z-index: 30; display: none;
    }
    .mic-dropdown.open { display: block; }
    .mic-dropdown-title {
      font-size: .63rem; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: .1em;
      padding: 4px 12px 6px;
    }
    .mic-option {
      display: block; width: 100%; text-align: left;
      padding: 8px 12px; border: none; background: none;
      color: var(--sub); font-size: .78rem; border-radius: 7px;
      cursor: pointer; transition: background .12s, color .12s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mic-option:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .mic-option.active { color: var(--accent); font-weight: 700; }

    /* ════════════════════════════════════════════
       モバイル（〜640px）
    ════════════════════════════════════════════ */
    @media (max-width: 640px) {
      /* ── Body ── */
      body { padding: 0 10px 96px; }

      /* ── ヘッダー ── */
      header { padding: 14px 0 0; gap: 6px; flex-wrap: nowrap; }
      h1 { font-size: 1.15rem; white-space: nowrap; }
      .header-right { gap: 5px; flex-wrap: nowrap; }
      /* 待機中バッジは小さく */
      #api-status { font-size: .72rem; padding: 3px 10px; }
      .proc-badge { font-size: .72rem; padding: 3px 10px; }
      /* ユーザーメニュー */
      .user-menu { padding: 3px 8px 3px 5px; gap: 6px; }
      .user-avatar { width: 22px; height: 22px; }
      .user-name { max-width: 72px; font-size: .66rem; }
      .session-badge { font-size: .58rem; padding: 2px 6px; }
      /* ドロップダウン */
      .user-dropdown-menu { min-width: 140px; }

      /* ── ホワイトボードカード ── */
      .mindmap-main-card { margin: 10px 0 0; min-height: 260px; }
      #mindmap-main-inner { padding: 10px 10px 84px; min-height: 200px; }
      #mindmap-main-inner .empty-hint { padding: 40px 0; font-size: .8rem; }
      .mindmap-main-label { font-size: .6rem; }
      #status-text { font-size: .68rem; }

      /* ── ホワイトボード 1列 ── */
      .whiteboard {
        grid-template-columns: 1fr;
        grid-auto-rows: minmax(100px, auto);
        gap: 8px;
      }


      /* ── セクション内カードも1列 ── */
      .wb-section-body {
        grid-template-columns: 1fr;
        padding: 6px;
      }
      .wb-section-body .wb-group,
      .wb-section-body .wb-add-form,
      .wb-section-body .wb-empty { grid-column: 1; }
      .wb-section-title { font-size: .82rem; }
      .wb-section-header { padding: 10px 12px 9px; }
      .wb-add-btn { font-size: 1.2rem; width: 28px; height: 28px; }

      /* ── カード：削除ボタンを常時表示（タップしやすく） ── */
      .wb-card { padding: 8px 10px; }
      .wb-card-delete {
        width: 22px; height: 22px;
        font-size: .68rem;
        opacity: 0.55; /* モバイルは常時うっすら表示 */
      }
      .wb-card:hover .wb-card-delete,
      .wb-card-delete { opacity: 0.55; }
      .wb-card-delete:hover,
      .wb-card-delete:active { opacity: 1; background: rgba(239,68,68,.7); color: #fff; }

      /* ── 録音オーバーレイ（タップ対象を大きく） ── */
      .rec-mini-overlay {
        padding: 7px 14px 7px 12px;
        bottom: 14px; right: 14px;
      }
      #rec-btn { width: 50px; height: 50px; font-size: 1.25rem; }
      #timer { font-size: 1rem; min-width: 38px; }

      /* ── アップグレードボタン（モバイルはテキスト短縮） ── */
      #upgrade-quick-btn { font-size: .7rem; padding: 5px 10px; }
      #upgrade-quick-btn .upgrade-label { display: none; }

      /* ── モーダル ── */
      .modal-box {
        padding: 28px 20px 24px;
        border-radius: 18px;
        margin: 12px;
      }
      .modal-icon { font-size: 2rem; }
      .modal-title { font-size: 1.05rem; }
      .modal-body { font-size: .82rem; margin-bottom: 22px; }
      .btn-upgrade { font-size: .92rem; padding: 13px 20px; }

      /* ── アップグレード成功バナー ── */
      .upgrade-banner {
        font-size: .78rem; padding: 8px 16px;
        max-width: calc(100vw - 24px);
        text-align: center;
      }

      /* ── ログ ── */
      .log-body { max-height: 260px; }
      .log-entry { padding: 10px 14px; }
      .log-txt { font-size: .82rem; }
    }

    /* ════════════════════════════════════════════
       小型スマートフォン（〜390px）
    ════════════════════════════════════════════ */
    @media (max-width: 390px) {
      body { padding: 0 8px 96px; }
      h1 { font-size: 1rem; }
      /* api-status を非表示にしてスペース確保 */
      #api-status { display: none; }
      .user-name { max-width: 60px; }
      #rec-btn { width: 46px; height: 46px; }
    }
  </style>
</head>
<body>

<header>
  <h1>ZONIST</h1>
  <div class="header-right">
    <span id="proc-badge" class="proc-badge" style="display:none">処理中 0件</span>
    <span id="api-status" class="badge badge-gray">待機中</span>
    <!-- アップグレードボタン（free時のみ表示） -->
    <button id="upgrade-quick-btn" style="display:none" onclick="showUpgradeModal('sessions')">
      ⬆ <span class="upgrade-label">アップグレード</span>
    </button>
    <!-- ユーザーメニュー（JS で表示） -->
    <div id="user-dropdown" class="user-dropdown" style="display:none">
      <div class="user-menu" id="user-menu-trigger">
        <img id="user-avatar" class="user-avatar" src="" alt="" />
        <span id="user-name" class="user-name"></span>
        <span id="session-badge" class="session-badge" style="display:none"></span>
      </div>
      <div id="user-dropdown-menu" class="user-dropdown-menu">
        <button id="btn-upgrade-menu" class="user-dropdown-item" style="display:none">
          ⬆ 有料プランへアップグレード
        </button>
        <button id="btn-logout" class="user-dropdown-item danger">ログアウト</button>
      </div>
    </div>
  </div>
</header>

<!-- 選択モードバー（モバイル長押しグルーピング） -->
<div id="select-group-bar">
  <span id="select-count-label">0件 選択中</span>
  <button id="btn-cancel-select">キャンセル</button>
  <button id="btn-do-group">グループにする</button>
</div>

<!-- アップグレードモーダル -->
<div id="upgrade-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div id="modal-icon" class="modal-icon">⏱</div>
    <div id="modal-title" class="modal-title"></div>
    <div id="modal-body"  class="modal-body"></div>
    <button class="btn-upgrade" onclick="goToStripe()">¥1,000/月 で無制限にする</button>
    <button class="btn-dismiss" onclick="closeUpgradeModal()">閉じる</button>
  </div>
</div>

<div class="mindmap-main-card">
  <div class="mindmap-main-header">
    <span class="mindmap-main-label">ホワイトボード</span>
    <div class="mindmap-header-right">
      <button id="btn-export" disabled title="ホワイトボードをJSONで保存">↓ 保存</button>
      <span id="status-text">ボタンを押して録音を開始してください</span>
    </div>
  </div>
  <div id="mindmap-main-inner">
    <div class="empty-hint">録音・アイデア抽出後にホワイトボードが表示されます</div>
  </div>
  <div class="rec-mini-overlay">
    <div class="mic-select-wrap" id="mic-select-wrap">
      <button class="mic-btn" id="mic-btn" title="マイクを選択">🎙</button>
      <div class="mic-dropdown" id="mic-dropdown">
        <div class="mic-dropdown-title">マイク選択</div>
        <div id="mic-list"></div>
      </div>
    </div>
    <span id="timer">0:00</span>
    <button id="rec-btn" title="録音開始"><span id="btn-icon">🎤</span></button>
  </div>
</div>

<div class="content-area">
  <div id="panel-log" class="main-panel">
    <div class="log-header">
      <span class="log-title">議事録ログ</span>
      <div class="log-header-right">
        <span id="log-count" class="log-count">0 件</span>
        <button id="btn-clear" class="btn-text">クリア</button>
      </div>
    </div>
    <div id="log-body" class="log-body">
      <div class="log-placeholder" id="log-placeholder">録音が完了すると、ここに文字起こし結果が表示されます</div>
    </div>
  </div>
</div>

<!-- アンドゥトースト -->
<div id="undo-toast">
  <span>カードを削除しました</span>
  <button id="undo-btn">元に戻す</button>
</div>

<script src="/static/app.js?v=13"></script>
</body>
</html>
