<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZONIST – ログイン</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
      background: #f8fafc;
      background-image:
        radial-gradient(at 0% 0%, rgba(0,87,255,.07) 0, transparent 50%),
        radial-gradient(at 100% 0%, rgba(138,43,226,.05) 0, transparent 50%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border: 1px solid rgba(0,0,0,.07);
      border-radius: 24px;
      padding: 52px 48px 44px;
      width: 100%; max-width: 420px;
      box-shadow: 0 12px 48px -8px rgba(0,0,0,.08);
      text-align: center;
    }
    .logo {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 36px; height: 36px; background: #0057FF;
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 20px; height: 20px; color: white; }
    .logo-name {
      font-size: 1.45rem; font-weight: 900; letter-spacing: -.03em; color: #0a0f1a;
    }
    h1 { font-size: 1.5rem; font-weight: 800; color: #0a0f1a; margin-bottom: 8px; }
    .subtitle { font-size: .9rem; color: #64748b; margin-bottom: 36px; line-height: 1.6; }
    .subtitle strong { color: #0a0f1a; font-weight: 700; }

    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 14px 20px; border-radius: 100px;
      background: #0057FF; color: white;
      font-size: 1rem; font-weight: 700; border: none; cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 18px rgba(0,87,255,.3);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-google:hover { transform: scale(1.03); box-shadow: 0 6px 24px rgba(0,87,255,.4); }
    .btn-google svg { width: 22px; height: 22px; flex-shrink: 0; }

    .divider { margin: 28px 0; border: none; border-top: 1px solid #e8ecf0; }

    .free-info {
      background: rgba(0,87,255,.04);
      border: 1px solid rgba(0,87,255,.1);
      border-radius: 12px; padding: 16px 18px;
      font-size: .82rem; color: #475569; line-height: 1.6; text-align: left;
    }
    .free-info strong { color: #0057FF; }

    .back-link {
      display: block; margin-top: 24px;
      font-size: .8rem; color: #94a3b8; text-decoration: none;
      transition: color .15s;
    }
    .back-link:hover { color: #0057FF; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </div>
      <span class="logo-name">ZONIST</span>
    </div>

    <h1>ログイン / 新規登録</h1>
    <p class="subtitle">
      Googleアカウントで<strong>3回無料</strong>で<br>すべての機能をお試しいただけます
    </p>

    <a href="/auth/google" class="btn-google">
      <!-- Google G logo -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="rgba(255,255,255,.8)" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="rgba(255,255,255,.6)" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="rgba(255,255,255,.9)" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Googleでログインして無料で始める
    </a>

    <hr class="divider" />

    <div class="free-info">
      ✓ 無料で <strong>3回のセッション</strong>（1回30分まで）を体験<br>
      ✓ クレジットカード登録不要<br>
      ✓ 継続利用は <strong>¥1,000/月</strong>（いつでも解約可）
    </div>

    <a href="/" class="back-link">← ランディングページに戻る</a>
  </div>
</body>
</html>
